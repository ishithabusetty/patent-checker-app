<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPR Risk Assessment Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { background: white; max-width: 900px; width: 100%; border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .upload-section {
    border: 2px dashed #cbd5e0;
    padding: 40px;
    text-align: center;
    border-radius: 12px;
    margin-bottom: 25px;
    background: #fff;
}

/* Hide the ugly default browser button */
#pdf-upload {
    display: none;
}

/* Style the custom "Choose" button */
.custom-upload-btn {
    background: #2563eb; /* Professional Blue */
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    display: inline-block;
    transition: background 0.2s;
}

.custom-upload-btn:hover {
    background: #1d4ed8;
}

.file-name-display {
    margin-top: 15px;
    font-size: 0.95rem;
    color: #64748b;
    font-style: italic;
}
        #analyze-btn { background: #1a202c; color: white; width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        
        /* THE BIG BOX - BOLD COLORS */
        .verdict-card { padding: 30px; border-radius: 12px; margin-top: 30px; text-align: center; border: 4px solid transparent; display: none; }
        .clear { background-color: #d1fae5 !important; border-color: #059669 !important; color: #064e3b !important; }
        .warning { background-color: #fef3c7 !important; border-color: #d97706 !important; color: #78350f !important; }
        .critical { background-color: #fee2e2 !important; border-color: #dc2626 !important; color: #7f1d1d !important; }

        .verdict-card h2 { font-size: 3rem; margin: 0; }
        .verdict-card .title { font-size: 1.4rem; font-weight: bold; margin: 15px 0; }
        .verdict-card .avg { font-size: 1.1rem; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px; margin-top: 15px; opacity: 0.8; }

        .matches-list { list-style: none; padding: 0; margin-top: 40px; }
        .match-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 25px; border-radius: 10px; margin-bottom: 20px; }
        .match-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>IPR Prior-Art Checker</h1>
        <div class="upload-section">
            <label for="pdf-upload" class="custom-upload-btn">
                Choose PDF Document
            </label>
            
            <input type="file" id="pdf-upload" accept=".pdf" style="display:none;">
            
            <div id="file-name-text" class="file-name-display" style="margin-top: 15px; font-style: italic; color: #64748b;">
                No file selected
            </div>
        </div>

        <button id="analyze-btn">Analyze for Prior Art</button>

        <div id="results-container" style="display:none;">
            <div id="verdict-card" class="verdict-card">
                <h2 id="overall-score">0%</h2>
                <div class="title" id="risk-title"></div>
                <div id="verdict-message"></div>
                <div class="avg" id="avg-score"></div>
            </div>
            
            <h3 style="margin-top: 40px;">Top Prior-Art Matches:</h3>
            <ul id="matches-list" class="matches-list"></ul>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/check-prior-art";

        // 2. ADD THE FILENAME UPDATER HERE
        const actualInput = document.getElementById('pdf-upload');
        const fileTextDisplay = document.getElementById('file-name-text');

        actualInput.onchange = () => {
            if (actualInput.files.length > 0) {
                fileTextDisplay.innerText = actualInput.files[0].name;
                fileTextDisplay.style.color = "#1a202c"; 
                fileTextDisplay.style.fontWeight = "bold";
            } else {
                fileTextDisplay.innerText = "No file selected";
            }
        };

        const btn = document.getElementById('analyze-btn');

        btn.onclick = async () => {
            const fileInput = document.getElementById('pdf-upload');
            const fileNameDisplay = document.getElementById('file-name');

            // Update filename when a file is selected
            fileInput.onchange = () => {
                if (fileInput.files.length > 0) {
                    fileNameDisplay.innerText = fileInput.files[0].name;
                    fileNameDisplay.style.color = "#1a202c"; // Darker color when file is present
                } else {
                    fileNameDisplay.innerText = "No file selected";
                }
            };
            btn.innerText = "Processing...";
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                const response = await fetch(API_URL, { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.status === "success") {
                    document.getElementById('results-container').style.display = 'block';
                    const card = document.getElementById('verdict-card');
                    card.style.display = 'block';

                    // Update UI
                    document.getElementById('overall-score').innerText = data.max_similarity_found + "% Max Similarity";
                    document.getElementById('risk-title').innerText = data.overall_risk_assessment;
                    document.getElementById('verdict-message').innerText = data.final_verdict;
                    document.getElementById('avg-score').innerText = "Average Similarity Score: " + data.average_similarity_score + "%";

                    // Apply Dynamic Class
                    card.classList.remove('clear', 'warning', 'critical');
                    if (data.max_similarity_found > 75) card.classList.add('critical');
                    else if (data.max_similarity_found > 40) card.classList.add('warning');
                    else card.classList.add('clear');

                    // Matches
                    const list = document.getElementById('matches-list');
                    list.innerHTML = data.top_matches.map(m => `
                        <li class="match-item">
                            <div class="match-header">
                                <span>Patent ID: ${m.publication_number}</span>
                                <span style="color:${m.similarity_score > 40 ? '#dc2626' : '#059669'}">${m.similarity_score}% Match</span>
                            </div>
                            <div style="color: #4a5568; line-height: 1.5;">${m.abstract_snippet}</div>
                        </li>
                    `).join('');
                }
            } catch (err) {
                alert("Cannot reach the backend. Ensure uvicorn is running and there are no errors in your terminal.");
                console.error(err);
            } finally {
                btn.innerText = "Analyze for Prior Art";
            }
        };
    </script>
</body>
</html>
